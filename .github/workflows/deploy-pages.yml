name: Deploy to GitHub Pages

# Builds & deploys the static site to GitHub Pages on every push to main.
# Uses the built-in GITHUB_TOKEN (NOT a personal token); enablement:true
# turns Pages on automatically so no web-UI step is needed (public repo).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - uses: actions/deploy-pages@v4
