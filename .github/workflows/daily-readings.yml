name: Update daily readings (Katameros)

# Refreshes data/reading-today.json every day from the open Katameros API.
# No backend needed — keeps the static site's "قراءة اليوم" current for free.
# Safe: uses no untrusted github.event inputs.

on:
  schedule:
    - cron: "15 2 * * *"   # ~04:15 Cairo (02:15 UTC) daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch today's readings (Arabic = languageId 3)
        run: |
          DATE=$(TZ=Africa/Cairo date +%d-%m-%Y)
          mkdir -p data
          curl -fsS "https://api.katameros.app/readings/gregorian/${DATE}?languageId=3" -o data/reading-today.json
          echo "Fetched readings for ${DATE}"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reading-today.json
          git commit -m "chore: daily readings refresh" || { echo "no changes"; exit 0; }
          git push
